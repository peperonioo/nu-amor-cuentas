<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Finance Tracker</title>
<meta name="description" content="Ventas, deudas y finanzas — Finance Tracker">
<meta name="theme-color" content="#1C1C1C">
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Finance Tracker">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<style>
  :root{
    --bg:#1C1C1C;--bg2:#242424;--line:#333;--lime:#CCFF00;
    --ink:#F2F2F0;--dim:#8A8A85;--green:#7CCF6B;--warn:#E6B800;--red:#E08B7C;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;padding:calc(20px + env(safe-area-inset-top)) calc(16px + env(safe-area-inset-right)) calc(60px + env(safe-area-inset-bottom)) calc(16px + env(safe-area-inset-left));max-width:640px;margin:0 auto;-webkit-font-smoothing:antialiased}
  .mono{font-family:"SF Mono",ui-monospace,"Roboto Mono",Menlo,monospace;font-variant-numeric:tabular-nums}
  header{margin-bottom:18px}
  .eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--dim);margin-bottom:6px}
  h1{font-size:26px;font-weight:800;letter-spacing:-.01em}

  .totals{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:18px 0 24px}
  .stat{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:13px 13px}
  .stat .lbl{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin-bottom:8px}
  .stat .val{font-size:19px;font-weight:700;line-height:1.25}
  .stat .val .sub{display:block}
  .stat.inflow .val{color:var(--green)}
  .stat.outflow .val{color:var(--warn)}
  .hero{background:linear-gradient(180deg,#262626,#202020);border:1px solid var(--line);border-radius:16px;padding:16px 16px 12px}
  .hero-lbl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin-bottom:8px}
  .hero-val{font-size:26px;font-weight:800;line-height:1.15;display:flex;flex-wrap:wrap;gap:4px 14px}
  .hero-val .sub{display:inline}
  .chart-lbl{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin:16px 0 6px}
  .chart{width:100%;height:92px;display:block}
  .chart rect{fill:var(--lime)}
  .chart text{fill:var(--dim);font-size:9px;font-family:inherit}
  .chart .hit{fill:transparent;cursor:pointer}
  .chart-tip{text-align:center;font-size:11.5px;color:var(--lime);margin-top:8px;min-height:16px;opacity:0;transition:opacity .15s}
  .chart-tip.show{opacity:1}
  /* entradas saldadas: atenuadas y con el importe tachado (no se borran) */
  .card.done{opacity:.62}
  .card.done .who,.card.done .date{color:var(--dim)}
  .card.done .pill s{opacity:.85}
  @media (hover:hover){ .card.done:hover{opacity:1} }
  .stat.sold .val{color:var(--lime)}
  .stat.collected .val{color:var(--green)}
  .stat.pending .val{color:var(--warn)}
  .stat.returned .val{color:var(--red)}
  .totals.tri{grid-template-columns:1fr 1fr 1fr}
  .totals.tri .stat{padding:11px 9px}
  .totals.tri .val{font-size:16px}
  #totals .group-lbl{margin:14px 0 8px}
  #totals .group-lbl:first-child{margin-top:4px}
  #totals .totals{margin:0 0 6px}
  .chk{display:flex;align-items:center;gap:9px;font-size:14px;color:var(--ink);margin:2px 0 12px;cursor:pointer;user-select:none}
  .chk input{margin:0;accent-color:var(--lime);width:18px;height:18px}
  .curlbl{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--dim);margin:2px 0 10px}
  .curlbl select{width:auto;flex:1;margin:0}
  .cur-edit{background:none;border:none;cursor:pointer;padding:0;font-family:inherit;font-size:11px;color:var(--dim);letter-spacing:.04em;margin-top:10px}
  .cur-edit:hover{color:var(--lime)}
  .del-entry{display:block;margin:16px 0 2px;background:none;border:none;color:#6b6b66;font-size:12px;font-weight:600;cursor:pointer;padding:8px 0;font-family:inherit;text-align:left}
  .del-entry:hover{color:var(--red)}
  .card.swiping{transition:none}
  .card.will-del{border-color:var(--red)}
  .card.will-del::after{content:"🗑  soltar para borrar";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;gap:6px;background:rgba(224,139,124,.16);color:var(--red);font-weight:700;font-size:13px;letter-spacing:.02em;border-radius:14px;pointer-events:none}
  /* confeti al saldar/cobrar del todo */
  .confetti{position:fixed;inset:0;pointer-events:none;z-index:60;overflow:hidden}
  .confetti i{position:absolute;top:28%;width:8px;height:12px;border-radius:2px;opacity:0;animation:conf var(--d) cubic-bezier(.2,.6,.4,1) forwards}
  @keyframes conf{0%{opacity:1;transform:translate(0,0) rotate(0)}100%{opacity:0;transform:translate(calc(var(--x)*160px),62vh) rotate(var(--r))}}

  .toolbar{display:flex;gap:8px;margin:18px 0 4px}
  .search{flex:1;background:var(--bg2);border:1px solid var(--line);border-radius:10px;color:var(--ink);padding:10px 12px;font-size:14px;font-family:inherit}
  .search:focus{outline:none;border-color:var(--lime)}
  .sort-select{background:var(--bg2);border:1px solid var(--line);border-radius:10px;color:var(--ink);padding:0 10px;font-size:13px;font-family:inherit}
  .sort-select:focus{outline:none;border-color:var(--lime)}
  .onboard{text-align:center;padding:48px 20px 40px}
  .onboard-emoji{font-size:44px;margin-bottom:10px}
  .onboard-title{font-size:19px;font-weight:800;margin-bottom:8px}
  .onboard-sub{font-size:14px;color:var(--dim);line-height:1.5;max-width:320px;margin:0 auto 20px}
  .onboard-btn{padding:13px 22px;font-size:15px}
  .group-lbl{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);margin:22px 0 10px;display:flex;align-items:center;gap:8px}
  .group-lbl::after{content:"";flex:1;height:1px;background:var(--line)}

  .card{background:var(--bg2);border:1px solid var(--line);border-radius:14px;margin-bottom:12px;overflow:hidden;position:relative}
  .head{display:flex;align-items:center;gap:12px;padding:15px 16px;cursor:pointer}
  .head .who{font-size:17px;font-weight:700;flex:1}
  .head .who .date{display:block;font-size:11px;font-weight:400;color:var(--dim);margin-top:2px}
  .pill{font-size:11px;font-weight:700;padding:4px 9px;border-radius:999px;white-space:nowrap}
  .pill.open{background:rgba(230,184,0,.14);color:var(--warn)}
  .pill.done{background:rgba(124,207,107,.16);color:var(--green)}
  .chev{color:var(--dim);font-size:13px;transition:transform .2s}
  .card.expanded .chev{transform:rotate(90deg)}
  .progress{height:4px;background:#2e2e2e}
  .progress > div{height:100%;transition:width .35s ease}
  .inflow .progress > div{background:var(--lime)}
  .outflow .progress > div{background:var(--warn)}

  .body{display:none;padding:4px 16px 16px}
  .card.expanded .body{display:block}
  .row{display:flex;justify-content:space-between;align-items:baseline;padding:7px 0;border-bottom:1px solid #2a2a2a;font-size:14px}
  .row:last-of-type{border-bottom:none}
  .row .free{color:var(--lime);font-size:11px;font-weight:700;letter-spacing:.08em}
  .row.total{font-weight:800;border-top:1px solid var(--line);margin-top:4px;padding-top:10px;border-bottom:none}
  .section-lbl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin:16px 0 8px}
  .pay{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:6px 0;color:var(--dim)}
  .pay .amt{color:var(--green);font-weight:700}
  .outflow .pay .amt{color:var(--warn)}
  .pay-del{background:none;border:none;color:#555;font-size:16px;cursor:pointer;padding:0 4px;line-height:1}
  .pay-del:hover{color:#c0564b}
  .nopay{font-size:13px;color:var(--dim);font-style:italic;padding:4px 0}
  /* botones de edición inline (renombrar / editar precio / importe) */
  .edit-btn{background:none;border:none;color:inherit;cursor:pointer;padding:0;font-size:inherit;font-weight:inherit;font-family:inherit;text-align:left}
  .edit-btn.mono{font-family:"SF Mono",ui-monospace,"Roboto Mono",Menlo,monospace;font-variant-numeric:tabular-nums}
  .edit-btn.free{color:var(--lime);font-size:11px;font-weight:700;letter-spacing:.08em}
  .edit-btn:hover{color:var(--lime)}
  .edit-btn .ed{color:var(--dim);font-size:11px;margin-left:5px}
  .edit-btn:hover .ed{color:var(--lime)}
  .who-edit{color:inherit}
  .row-right{display:flex;align-items:baseline;gap:8px}
  /* coste / ganancia (solo en el desglose de cada venta) */
  .row.cost{color:var(--dim);border-bottom:none}
  .row.profit{font-weight:800;border-top:1px solid var(--line);margin-top:2px;padding-top:10px;border-bottom:none}
  .profit-pos{color:var(--lime)}
  .profit-neg{color:var(--red)}
  .add-cost{font-size:12px;color:var(--dim);background:none;border:none;cursor:pointer;padding:8px 0 2px;font-weight:600}
  .add-cost:hover{color:var(--lime)}
  /* coste por artículo (pequeño y gris, debajo del precio) */
  .row.item{align-items:center}
  .item-amounts{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
  .item-cost{background:none;border:none;cursor:pointer;padding:0;font-family:inherit;font-size:10.5px;letter-spacing:.02em;line-height:1.2;color:#6b6b66}
  .item-cost:hover{color:var(--lime)}
  .item-cost.add{color:#4f4f4c}
  .balance-line{display:flex;justify-content:space-between;margin-top:12px;padding-top:12px;border-top:1px solid var(--line);font-size:15px;font-weight:700}
  .balance-line .amt{color:var(--warn)}
  .balance-line.cleared .amt{color:var(--green)}
  .addpay{display:flex;gap:8px;margin-top:12px}
  .addpay input{flex:1;background:var(--bg);border:1px solid var(--line);border-radius:9px;color:var(--ink);padding:10px 12px;font-size:15px}
  .addpay input:focus{outline:none;border-color:var(--lime)}
  .btn{background:var(--lime);color:#111;border:none;border-radius:9px;font-weight:700;font-size:14px;padding:0 16px;cursor:pointer}
  .btn:active{transform:translateY(1px)}
  .quick{display:block;font-size:12px;color:var(--lime);background:none;border:none;cursor:pointer;padding:8px 0 0;font-weight:600;text-align:left}
  .addbtns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
  .btn.ghost{background:none;color:var(--dim);border:1px dashed var(--line);padding:13px}
  .btn.ghost:hover{color:var(--lime);border-color:var(--lime)}

  dialog{background:var(--bg2);color:var(--ink);border:1px solid var(--line);border-radius:16px;padding:20px;max-width:420px;width:92%}
  dialog::backdrop{background:rgba(0,0,0,.6)}
  dialog h2{font-size:17px;margin-bottom:14px}
  dialog input,dialog select{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:9px;color:var(--ink);padding:10px 12px;font-size:15px;margin-bottom:8px}
  dialog input:focus,dialog select:focus{outline:none;border-color:var(--lime)}
  dialog textarea{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:9px;color:var(--ink);padding:10px 12px;font-size:15px;margin-bottom:8px;font-family:inherit;resize:vertical;line-height:1.4}
  dialog textarea:focus{outline:none;border-color:var(--lime)}
  .hint{font-size:12.5px;color:var(--dim);margin-bottom:10px;line-height:1.4}
  .imp-sep{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin:4px 0 10px}
  .btn.ghost.wide{width:100%;margin-top:8px;padding:13px}
  .item-row{display:flex;gap:6px}
  .item-row input.iname{flex:2}
  .item-row input.iprice{flex:1}
  .two{display:flex;gap:8px}
  .two > *{flex:1}
  .dlg-actions{display:flex;gap:8px;margin-top:6px}
  .dlg-actions .btn{flex:1;padding:12px}
  .dlg-actions .btn.cancel{background:none;color:var(--dim);border:1px solid var(--line)}
  .loading{text-align:center;color:var(--dim);padding:40px;font-size:14px}
  .empty{font-size:13px;color:var(--dim);font-style:italic;padding:2px 2px 8px}
  .backup{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:22px}
  .lnk{background:none;border:none;color:var(--dim);font-size:12.5px;cursor:pointer;font-family:inherit;padding:6px 4px}
  .lnk:hover{color:var(--lime)}
  .backup .sep{color:#3a3a3a}
  .backup-hint{text-align:center;font-size:11.5px;color:var(--dim);margin-top:8px}
  .backup-hint .warn{color:var(--warn)}
  .backup-hint .ok{color:var(--green)}

  /* ——— vida / micro-animaciones (misma paleta, sin tocar el diseño) ——— */
  @keyframes cardIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  @keyframes bodyIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:none}}
  @keyframes dlgIn{from{opacity:0;transform:translateY(10px) scale(.97)}to{opacity:1;transform:none}}
  @keyframes bdIn{from{opacity:0}to{opacity:1}}
  @keyframes flashGlow{0%{box-shadow:0 0 0 0 rgba(204,255,0,0)}25%{box-shadow:0 0 0 2px rgba(204,255,0,.45)}100%{box-shadow:0 0 0 0 rgba(204,255,0,0)}}
  @keyframes riseIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  header{animation:riseIn .4s ease both}
  .card.expanded .body{animation:bodyIn .2s ease both}
  .card.flash{animation:flashGlow .7s ease}
  /* el botón lima late un pelín al pulsar */
  .btn{transition:transform .09s ease, filter .15s ease}
  .btn:hover{filter:brightness(1.06)}
  .stat{transition:transform .15s ease, border-color .15s ease}
  .lnk,.quick,.btn.ghost,.edit-btn,.pay-del,.chev{transition:color .16s ease, border-color .16s ease, transform .16s ease}
  .progress > div{will-change:width}
  /* lift sólo en dispositivos con cursor (no en táctil) */
  @media (hover:hover){
    .card{transition:transform .18s ease, border-color .18s ease}
    .card:hover{transform:translateY(-2px);border-color:#3f3f3f}
    .stat:hover{transform:translateY(-2px);border-color:#3f3f3f}
  }
  dialog[open]{animation:dlgIn .24s cubic-bezier(.2,.7,.3,1) both}
  dialog[open]::backdrop{animation:bdIn .24s ease both}

  /* accesibilidad: respeta a quien desactiva el movimiento */
  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{animation:none!important;transition:none!important}
  }
</style>
</head>
<body>
<header>
  <div class="eyebrow">Finance Tracker</div>
  <h1>Ventas y deudas</h1>
</header>

<div id="totals"></div>
<div id="toolbar" class="toolbar" style="display:none">
  <input id="q" class="search" placeholder="Buscar por nombre o artículo…" autocomplete="off" oninput="onSearch(this.value)">
  <select id="sortSel" class="sort-select" onchange="onSort(this.value)">
    <option value="recent">Recientes</option>
    <option value="amount">Mayor importe</option>
    <option value="pending">Pendientes 1º</option>
  </select>
</div>
<div id="app"><div class="loading">Cargando…</div></div>

<div class="addbtns">
  <button class="btn ghost" onclick="openNew('sale')">+ Venta</button>
  <button class="btn ghost" onclick="openNew('debt')">+ Deuda</button>
</div>
<button class="btn ghost wide" onclick="openImport()">✨ Importar de texto o foto</button>

<div class="backup">
  <button class="lnk" onclick="shareData()">⬇︎ Guardar copia</button>
  <span class="sep">·</span>
  <label class="lnk">↑ Restaurar copia
    <input type="file" accept="application/json,.json" onchange="importData(this)" hidden>
  </label>
  <span class="sep">·</span>
  <button class="lnk" onclick="startEmpty()">⌀ Empezar vacío</button>
</div>
<div id="backupHint" class="backup-hint"></div>

<dialog id="dlgSale">
  <h2>Nueva venta</h2>
  <input id="s_buyer" placeholder="Comprador" autocomplete="off">
  <div id="itemRows"></div>
  <button class="quick" onclick="addItemRow()">+ añadir artículo</button>
  <label class="curlbl">Moneda <select id="s_cur" class="cur-select"></select></label>
  <label class="chk"><input type="checkbox" id="s_paid"> Ya cobrada (al contado)</label>
  <div class="dlg-actions">
    <button class="btn cancel" onclick="dlgSale.close()">Cancelar</button>
    <button class="btn" onclick="saveSale()">Guardar</button>
  </div>
</dialog>

<dialog id="dlgDebt">
  <h2>Nueva deuda</h2>
  <input id="d_who" placeholder="¿A quién le debes?" autocomplete="off">
  <input id="d_concept" placeholder="¿Qué es? (opcional: préstamo, alquiler…)" autocomplete="off">
  <div class="two">
    <input id="d_amount" type="number" inputmode="decimal" placeholder="Importe que debes">
    <select id="d_cur" class="cur-select"></select>
  </div>
  <div class="dlg-actions">
    <button class="btn cancel" onclick="dlgDebt.close()">Cancelar</button>
    <button class="btn" onclick="saveDebt()">Guardar</button>
  </div>
</dialog>

<dialog id="dlgImport">
  <h2>✨ Importar</h2>
  <div id="imp_step1">
    <p class="hint">Pega un texto o sube una foto (recibo, lista, nota). Detecta artículos e importes; tú revisas antes de crear. El OCR de fotos funciona mejor con texto claro/impreso.</p>
    <label class="btn ghost wide" style="margin-top:0">📷 Foto / recibo
      <input type="file" id="imp_file" accept="image/*" hidden>
    </label>
    <textarea id="imp_text" rows="5" placeholder="…o pega aquí el texto. Una línea por artículo, ej:&#10;Guitarra 200&#10;Bajo 90&#10;Akai 100"></textarea>
    <div id="imp_status" class="hint"></div>
    <div class="dlg-actions">
      <button class="btn cancel" onclick="dlgImport.close()">Cancelar</button>
      <button class="btn" onclick="impAnalyze()">Analizar</button>
    </div>
  </div>
  <div id="imp_step2" style="display:none"></div>
</dialog>

<!-- diálogo genérico de edición/confirmación (sustituye a prompt/confirm,
     poco fiables dentro de una PWA instalada en iOS) -->
<dialog id="dlgEdit">
  <h2 id="ed_title"></h2>
  <input id="ed_input" autocomplete="off">
  <select id="ed_select" style="display:none"></select>
  <div class="dlg-actions">
    <button class="btn cancel" id="ed_cancel">Cancelar</button>
    <button class="btn" id="ed_ok">Guardar</button>
  </div>
</dialog>

<script>
let entries = [];
let introMode = false; // entrada escalonada solo en la primera carga
const dlgSale = document.getElementById("dlgSale");
const dlgDebt = document.getElementById("dlgDebt");
const dlgEdit = document.getElementById("dlgEdit");
const dlgImport = document.getElementById("dlgImport");

/* Diálogo propio (reemplaza prompt/confirm/alert, poco fiables en PWA iOS).
   askEdit → texto/número | askConfirm → sí/no | notify → solo aviso. */
let edResolve = null;
function edClose(val){ const r=edResolve; edResolve=null; dlgEdit.close(); if(r) r(val); }
function askEdit(title, value="", opts={}){
  return new Promise(resolve=>{
    edResolve = resolve;
    document.getElementById("ed_title").textContent = title;
    document.getElementById("ed_select").style.display = "none";
    const inp = document.getElementById("ed_input");
    inp.style.display = "";
    inp.type = opts.number ? "number" : "text";
    if(opts.number) inp.setAttribute("inputmode","decimal"); else inp.removeAttribute("inputmode");
    inp.value = (value==null ? "" : value);
    document.getElementById("ed_ok").textContent = opts.ok || "Guardar";
    document.getElementById("ed_cancel").style.display = "";
    dlgEdit.showModal();
    setTimeout(()=>{ try{ inp.focus(); inp.select(); }catch(e){} }, 40);
  });
}
function askChoose(title, options, current){
  return new Promise(resolve=>{
    edResolve = resolve;
    document.getElementById("ed_title").textContent = title;
    document.getElementById("ed_input").style.display = "none";
    const sel = document.getElementById("ed_select");
    sel.style.display = "";
    sel.innerHTML = options.map(o=>`<option value="${o}"${o===current?" selected":""}>${o}</option>`).join("");
    document.getElementById("ed_ok").textContent = "Guardar";
    document.getElementById("ed_cancel").style.display = "";
    dlgEdit.showModal();
  });
}
function askConfirm(title, ok="Sí"){
  return new Promise(resolve=>{
    edResolve = resolve;
    document.getElementById("ed_title").textContent = title;
    document.getElementById("ed_input").style.display = "none";
    document.getElementById("ed_select").style.display = "none";
    document.getElementById("ed_ok").textContent = ok;
    document.getElementById("ed_cancel").style.display = "";
    dlgEdit.showModal();
  });
}
function notify(title){
  return new Promise(resolve=>{
    edResolve = resolve;
    document.getElementById("ed_title").textContent = title;
    document.getElementById("ed_input").style.display = "none";
    document.getElementById("ed_select").style.display = "none";
    document.getElementById("ed_ok").textContent = "OK";
    document.getElementById("ed_cancel").style.display = "none";
    dlgEdit.showModal();
  });
}
document.getElementById("ed_ok").onclick = () => {
  const inp = document.getElementById("ed_input");
  const sel = document.getElementById("ed_select");
  if(sel.style.display !== "none") edClose(sel.value);

const REDUCE = !!(window.matchMedia && matchMedia("(prefers-reduced-motion: reduce)").matches);
// count-up: los números del resumen suben hasta su valor (con fallback si rAF no corre)
const lastCounts = {};
let cuTimer=null;
function animateCounts(fromZero){
  if(REDUCE) return; // el HTML ya trae los valores finales
  const items=[...document.querySelectorAll(".cu")].map(el=>({
    el, key:el.dataset.key, to:+el.dataset.to, cur:el.dataset.cur, sign:el.dataset.sign||"",
    from: fromZero?0:(el.dataset.key in lastCounts?lastCounts[el.dataset.key]:0)
  }));
  if(!items.length) return;
  const dur=650, t0=performance.now(), fmt=(v,cur,sign)=>sign+money(v,cur);
  clearTimeout(cuTimer);
  cuTimer=setTimeout(()=>items.forEach(it=>{ it.el.textContent=fmt(it.to,it.cur,it.sign); lastCounts[it.key]=it.to; }), dur+220);
  (function step(now){
    const p=Math.min(1,(now-t0)/dur), e=1-Math.pow(1-p,3);
    items.forEach(it=>it.el.textContent=fmt(it.from+(it.to-it.from)*e,it.cur,it.sign));
    if(p<1) requestAnimationFrame(step);
    else { items.forEach(it=>{ it.el.textContent=fmt(it.to,it.cur,it.sign); lastCounts[it.key]=it.to; }); clearTimeout(cuTimer); }
  })(performance.now());
}
// confeti lima al saldar/cobrar una entrada del todo
function confetti(){
  if(REDUCE) return;
  const colors=["#CCFF00","#F2F2F0","#7CCF6B"];
  const box=document.createElement("div"); box.className="confetti";
  for(let i=0;i<26;i++){
    const p=document.createElement("i");
    p.style.setProperty("--x",(Math.random()*2-1).toFixed(2));
    p.style.setProperty("--r",((Math.random()*540-270)|0)+"deg");
    p.style.setProperty("--d",(0.9+Math.random()*0.7).toFixed(2)+"s");
    p.style.left=(44+Math.random()*12)+"%";
    p.style.background=colors[i%3];
    box.appendChild(p);
  }
  document.body.appendChild(box);
  setTimeout(()=>box.remove(), 2000);
}

const fmt = n => Math.round(n).toLocaleString("en-AU");

const niceDate = iso => { const [y,m,d]=iso.split("-"); return `${d}/${m}/${y.slice(2)}`; };
const CURRENCIES = ["AUD","USD","EUR","GBP","NZD","CAD","MXN","COP","ARS","BRL","CLP","JPY"];
const SYMBOLS = {AUD:"A$",USD:"US$",EUR:"€",GBP:"£",NZD:"NZ$",CAD:"C$",MXN:"MX$",COP:"COP$",ARS:"AR$",BRL:"R$",CLP:"CLP$",JPY:"¥"};
const sym = c => SYMBOLS[c] || ((c||"")+" ");
const money = (n,c) => sym(c)+fmt(n);
const esc = t => (t+"").replace(/[<>&]/g,x=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[x]));

// Persistencia: solo localStorage (la app corre como PWA, sin backend).
const Store = {
  get(k){
    try{ return localStorage.getItem(k); }catch(e){ return null; }
  },
  set(k,v){
    try{ localStorage.setItem(k,v); return true; }catch(e){ return false; }
  }
};

const principal = e => e.type==="sale" ? e.items.reduce((a,i)=>a+(+i.price||0),0) : (+e.principal||0);
const paid = e => e.payments.reduce((a,p)=>a+(+p.amount||0),0);
const balance = e => principal(e) - paid(e);

function save(){ Store.set("entries", JSON.stringify(entries)); }

// Devuelve siempre un array de entradas saneadas (tolera datos vacíos/corruptos).
function normalize(data){
  if(!Array.isArray(data)) return [];
  return data
    .filter(e => e && typeof e === "object")
    .map(e=>{
      if(!e.type){ e.type = "sale"; }
      if(e.type==="sale" && !e.party) e.party = e.buyer || "—";
      if(!e.party) e.party = "—";
      if(!e.currency) e.currency = "AUD";
      if(!e.date) e.date = today();
      e.items = Array.isArray(e.items) ? e.items : [];
      e.payments = Array.isArray(e.payments) ? e.payments : [];
      e.items.forEach(i=>{ if(i && i.name==="Coffee") i.name="Coffee machine"; });
      // migración: coste por venta (e.cost) → coste del primer artículo con precio
      if(e.type==="sale" && +e.cost>0 && e.items.length){
        if(!e.items.some(i=>+i.cost>0)){
          const target = e.items.find(i=>+i.price>0) || e.items[0];
          target.cost = (+target.cost||0) + (+e.cost);
        }
      }
      if(e.type==="sale") delete e.cost;
      return e;
    });
}

function load(){
  let data=null;
  try{ const v=Store.get("entries"); data = v?JSON.parse(v):null; }catch(e){}

  // compatibilidad con versión anterior (solo ventas, clave "sales")
  if(!Array.isArray(data)){
    try{ const old=Store.get("sales"); if(old){ data=JSON.parse(old); } }catch(e){}
  }

  if(!Array.isArray(data)) data = [];

  // sembrar los datos de ejemplo SOLO en la primera vez (no si el usuario ya
  // usó la app y la vació con "Empezar vacío").
  const firstRun = !Store.get("seed_debts");
  if(firstRun && !data.length){ data = [seedTristan()]; }

  entries = normalize(data);

  if(firstRun){
    seedDebts().forEach(d=>{ if(!entries.some(x=>x.id===d.id)) entries.push(d); });
    Store.set("seed_debts","1");
  }

  save();
  render(true); // entrada escalonada en la primera carga
}

function sumByCurrency(list){
  const m={};
  list.forEach(e=>{ const b=balance(e); if(b>0){ m[e.currency]=(m[e.currency]||0)+b; } });
  return m;
}
// Dinero realmente movido (suma de pagos), por moneda — para el tracker de finanzas.
function sumPaidByCurrency(list){
  const m={};
  list.forEach(e=>{ const p=paid(e); if(p>0){ m[e.currency]=(m[e.currency]||0)+p; } });
  return m;
}
// Valor total facturado/vendido (cobrado + pendiente), por moneda.
function sumSoldByCurrency(list){
  const m={};
  list.forEach(e=>{ const t=principal(e); if(t>0){ m[e.currency]=(m[e.currency]||0)+t; } });
  return m;
}
function currencyHTML(m, key){
  const keys=Object.keys(m);
  if(!keys.length) return `<span class="sub">—</span>`;
  return keys.map(c=> key
    ? `<span class="sub mono cu" data-key="${key}-${c}" data-to="${m[c]}" data-cur="${c}">${money(m[c],c)}</span>`
    : `<span class="sub mono">${money(m[c],c)}</span>`).join("");
}
/* ——— resumen: neto y mini-gráfico ——— */
const MONTHS=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
function netByCurrency(){
  const inn = sumByCurrency(entries.filter(e=>e.type==="sale"));
  const out = sumByCurrency(entries.filter(e=>e.type==="debt"));
  const m = {};
  Object.keys(inn).forEach(c=>m[c]=(m[c]||0)+inn[c]);
  Object.keys(out).forEach(c=>m[c]=(m[c]||0)-out[c]);
  return m;
}
function netHTML(m){
  const keys=Object.keys(m).filter(c=>Math.round(m[c])!==0);
  if(!keys.length) return `<span class="sub">—</span>`;
  return keys.map(c=>{
    const v=m[c], cls=v>=0?"profit-pos":"profit-neg";
    return `<span class="sub mono cu ${cls}" data-key="neto-${c}" data-to="${Math.abs(v)}" data-cur="${c}" data-sign="${v<0?'−':''}">${(v<0?"−":"")+money(Math.abs(v),c)}</span>`;
  }).join("");
}
function dominantCurrency(){
  const c={}; entries.forEach(e=>{ c[e.currency]=(c[e.currency]||0)+1; });
  let best="AUD", n=-1; Object.keys(c).forEach(k=>{ if(c[k]>n){ n=c[k]; best=k; } });
  return best;
}
function monthlySeries(cur){
  const now=new Date(), buckets=[];
  for(let k=5;k>=0;k--){
    const d=new Date(now.getFullYear(), now.getMonth()-k, 1);
    buckets.push({ ym:`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`, label:MONTHS[d.getMonth()], labelFull:`${MONTHS[d.getMonth()]} '${String(d.getFullYear()).slice(2)}`, value:0 });
  }
  entries.filter(e=>e.type==="sale" && e.currency===cur).forEach(e=>{
    e.payments.forEach(p=>{ const b=buckets.find(x=>x.ym===(p.date||"").slice(0,7)); if(b) b.value+=(+p.amount||0); });
  });
  return buckets;
}
function chartSVG(series){
  const max=Math.max(1, ...series.map(s=>s.value));
  const W=300, H=92, gap=10, n=series.length, bw=(W-gap*(n-1))/n;
  return `<svg viewBox="0 0 ${W} ${H}" class="chart" preserveAspectRatio="none">`+
    series.map((s,i)=>{
      const h=Math.round((s.value/max)*(H-24)), x=i*(bw+gap);
      return `<rect x="${x}" y="${H-20-h}" width="${bw}" height="${Math.max(h,2)}" rx="3" opacity="${s.value?0.92:0.16}"></rect>`+
             `<text x="${x+bw/2}" y="${H-5}" text-anchor="middle">${s.label}</text>`+
             `<rect class="hit" x="${x-gap/2}" y="0" width="${bw+gap}" height="${H}" onclick="chartTap(${i})"></rect>`;
    }).join("")+`</svg>`;
}
let lastSeries=[], lastChartCur="AUD", chartTipT=null;

let searchQuery = "", sortMode = "recent";
function onboardingHTML(){
  return `<div class="onboard">
    <div class="onboard-emoji">💸</div>
    <div class="onboard-title">Empieza a registrar</div>
    <div class="onboard-sub">Añade tu primera venta o deuda — o crea varias de golpe con “✨ Importar” (texto o foto).</div>
    <button class="btn onboard-btn" onclick="openNew('sale')">+ Añadir venta</button>
  </div>`;
}
function sortEntries(list){
  const arr=[...list];
  const cmp = sortMode==="amount" ? (a,b)=>balance(b)-balance(a)
    : sortMode==="pending" ? (a,b)=>balance(b)-balance(a)
    : (a,b)=> (b.date||"").localeCompare(a.date||"") || (b.id>a.id?1:-1);
  arr.sort((a,b)=>{
    const ca=balance(a)<=0, cb=balance(b)<=0;
    if(ca!==cb) return ca?1:-1;   // las saldadas siempre al fondo del grupo
    return cmp(a,b);
  });
  return arr;
}
function renderList(){
  let sales = entries.filter(e=>e.type==="sale");

  const q=(searchQuery||"").trim().toLowerCase();

      || (e.concept||"").toLowerCase().includes(q)
      || (e.items||[]).some(i=>(i.name||"").toLowerCase().includes(q));
    sales=sales.filter(match); debts=debts.filter(match);
  }
  sales=sortEntries(sales); debts=sortEntries(debts);
  document.getElementById("app").innerHTML = `
    <div class="group-lbl">Ventas</div>

    <div class="group-lbl">Deudas</div>

  `;
}

    </div>

function card(e,i){
  const tot=principal(e), pd=paid(e), bal=tot-pd, cleared=bal<=0;
  const pct = tot ? Math.min(100,Math.round(pd/tot*100)) : 100;
  const cur=e.currency, flow=e.type==="sale"?"inflow":"outflow";

  let detail;
  if(e.type==="sale"){
    detail = e.items.map((i,idx)=>{
      const ic = +i.cost||0;
      const costBtn = ic>0
        ? `<button class="item-cost" onclick="editItemCost('${e.id}',${idx})" title="Editar coste">pagué ${money(ic,cur)}</button>`
        : `<button class="item-cost add" onclick="editItemCost('${e.id}',${idx})" title="Añadir coste">+ coste</button>`;
      return `<div class="row item">
        <button class="edit-btn" onclick="renameItem('${e.id}',${idx})" title="Renombrar artículo">${esc(i.name)}<span class="ed">✎</span></button>
        <span class="row-right">
          <span class="item-amounts">
            <button class="edit-btn mono${i.price>0?'':' free'}" onclick="editItemPrice('${e.id}',${idx})" title="Editar precio">${i.price>0?money(i.price,cur):'GRATIS'}</button>
            ${costBtn}
          </span>
          <button class="pay-del" onclick="delItem('${e.id}',${idx})" title="Quitar artículo">×</button>
        </span>
      </div>`;
    }).join("")
    + `<button class="quick" onclick="addItemTo('${e.id}')">+ añadir artículo</button>`
    + `<div class="row total"><span>Total vendido</span><span class="mono">${money(tot,cur)}</span></div>`;
    // coste (suma de los costes por artículo) y ganancia — solo en el desglose
    const cost = e.items.reduce((a,i)=>a+(+i.cost||0),0);
    if(cost>0){
      const profit = tot - cost;
      const profitStr = (profit<0?"−":"") + money(Math.abs(profit),cur);
      detail += `<div class="row cost"><span>Pagué (coste)</span><span class="mono">${money(cost,cur)}</span></div>`
        + `<div class="row profit"><span>Ganancia</span><span class="mono ${profit>=0?'profit-pos':'profit-neg'}">${profitStr}</span></div>`;
    }
  } else {
    const concept = e.concept || "Prestado";
    detail = `<div class="row"><button class="edit-btn" onclick="editConcept('${e.id}')" title="Editar concepto">${esc(concept)}<span class="ed">✎</span></button><button class="edit-btn mono" onclick="editPrincipal('${e.id}')" title="Editar importe">${money(tot,cur)}<span class="ed">✎</span></button></div>`;
  }

  const pays = e.payments.length
    ? e.payments.map((p,pi)=>`<div class="pay"><span>${niceDate(p.date)}</span><span><span class="amt mono">+${money(p.amount,cur)}</span> <button class="pay-del" onclick="delPay('${e.id}',${pi})">×</button></span></div>`).join("")
    : `<div class="nopay">${e.type==="sale"?"Aún sin pagos.":"Aún no has devuelto nada."}</div>`;

  const balLabel = e.type==="sale" ? (cleared?"Cobrado":"Te debe") : (cleared?"Saldado":"Debes");
  // aunque esté cobrado/saldado, mostramos el importe (cuánto recibiste/devolviste)
  const pillTxt = cleared ? ("✓ <s>"+money(tot,cur)+"</s>") : money(bal,cur);
  // bajo el nombre: primer artículo (+ cuántos más) en las ventas
  const itemHint = (e.type==="sale" && e.items.length)
    ? esc(e.items[0].name) + (e.items.length>1 ? ` +${e.items.length-1}` : "") + " · "
    : (e.type==="debt" && e.concept ? esc(e.concept) + " · " : "");
  const payLabel = e.type==="sale" ? "Cobrar" : "Pagar";
  const quick = e.id==="tristan" ? `<button class="quick" onclick="quickPay('${e.id}',100)">+ pago semanal de 100</button>` : "";

  return `
  <div class="card ${flow} ${e._open?'expanded':''} ${cleared?'done':''}" data-id="${e.id}"${inAnim(i)}>
    <div class="head" onclick="toggle('${e.id}')">
      <span class="chev">▶</span>
      <div class="who"><button class="edit-btn who-edit" onclick="event.stopPropagation();renameEntry('${e.id}')" title="Renombrar">${esc(e.party)}<span class="ed">✎</span></button><span class="date">${itemHint}${niceDate(e.date)}</span></div>
      <span class="pill ${cleared?'done':'open'}">${pillTxt}</span>
    </div>
    <div class="progress"><div style="width:${pct}%"></div></div>
    <div class="body">
      ${detail}
      <button class="cur-edit" onclick="editCurrency('${e.id}')" title="Cambiar moneda">Moneda: ${e.currency||'AUD'} ✎</button>
      <div class="section-lbl">${e.type==="sale"?"Pagos recibidos":"Devoluciones"}</div>
      ${pays}
      <div class="balance-line ${cleared?'cleared':''}"><span>${balLabel}</span><span class="amt mono">${money(Math.max(0,bal),cur)}</span></div>
      ${cleared?"":`
      <div class="addpay">
        <input id="pin-${e.id}" type="number" inputmode="decimal" placeholder="Importe (${cur})">
        <button class="btn" onclick="addPay('${e.id}')">${payLabel}</button>
      </div>
      <button class="quick" onclick="markPaidFull('${e.id}')">✓ ${e.type==="sale"?"marcar como cobrada":"marcar como saldada"}</button>${quick}`}
      <button class="del-entry" onclick="delEntry('${e.id}')">🗑 Borrar ${e.type==='sale'?'venta':'deuda'}</button>
    </div>
  </div>`;
}

function toggle(id){ const e=entries.find(x=>x.id===id); e._open=!e._open; render(); }
async function addPay(id){
  const inp=document.getElementById("pin-"+id); const v=parseFloat(inp.value);
  if(!v||v<=0){ inp.focus(); return; }
  const e=entries.find(x=>x.id===id); const wasCleared=balance(e)<=0;
  e.payments.push({amount:v,date:today()}); e._open=true;
  await save(); render(); pulse(id);
  if(!wasCleared && balance(e)<=0) confetti();
}
async function quickPay(id,amt){
  const e=entries.find(x=>x.id===id); const wasCleared=balance(e)<=0;
  e.payments.push({amount:amt,date:today()}); e._open=true; await save(); render(); pulse(id);
  if(!wasCleared && balance(e)<=0) confetti();
}
async function markPaidFull(id){
  const e=entries.find(x=>x.id===id); if(!e) return;
  const bal=balance(e); if(bal<=0) return;
  e.payments.push({amount:bal,date:today()}); e._open=true;
  await save(); render(); pulse(id); confetti();
}
async function delPay(id,pi){ const e=entries.find(x=>x.id===id); e.payments.splice(pi,1); e._open=true; await save(); render(); }
async function delEntry(id){
  const e=entries.find(x=>x.id===id); if(!e) return;
  const tipo = e.type==="sale" ? "la venta" : "la deuda";
  if(!await askConfirm("¿Borrar "+tipo+" de «"+e.party+"» y todo su historial? No se puede deshacer.","Borrar")) return;
  entries = entries.filter(x=>x.id!==id);
  await save(); render();
}

/* edición de nombres / importes — vía diálogo propio (funciona en PWA) */
async function renameEntry(id){
  const e=entries.find(x=>x.id===id); if(!e) return;
  const v=await askEdit(e.type==="sale"?"Nombre del comprador":"¿A quién le debes?", e.party);
  if(v===null) return;
  const t=v.trim(); if(!t) return;
  e.party=t; e._open=true; await save(); render();
}
async function renameItem(id,idx){
  const e=entries.find(x=>x.id===id); if(!e||!e.items[idx]) return;
  const v=await askEdit("Nombre del artículo", e.items[idx].name);
  if(v===null) return;
  const t=v.trim(); if(!t) return;
  e.items[idx].name=t; e._open=true; await save(); render();
}
async function editItemPrice(id,idx){
  const e=entries.find(x=>x.id===id); if(!e||!e.items[idx]) return;
  const v=await askEdit("Precio de «"+e.items[idx].name+"» (0 = gratis)", e.items[idx].price, {number:true});
  if(v===null) return;
  const n=parseFloat(v);
  e.items[idx].price = (isNaN(n)||n<0) ? 0 : n;
  e._open=true; await save(); render();
}
async function addItemTo(id){
  const e=entries.find(x=>x.id===id); if(!e) return;
  const name=await askEdit("Nombre del artículo nuevo"); if(name===null) return;
  const t=name.trim(); if(!t) return;
  const pv=await askEdit("Precio de «"+t+"» (0 = gratis)","0",{number:true}); if(pv===null) return;
  const n=parseFloat(pv);
  e.items.push({name:t, price:(isNaN(n)||n<0)?0:n});
  e._open=true; await save(); render();
}
async function delItem(id,idx){
  const e=entries.find(x=>x.id===id); if(!e||!e.items[idx]) return;
  if(e.items.length<=1){ await notify("Una venta necesita al menos un artículo. Renómbralo en vez de borrarlo."); return; }
  if(!await askConfirm("¿Quitar «"+e.items[idx].name+"» de esta venta?","Quitar")) return;
  e.items.splice(idx,1); e._open=true; await save(); render();
}
async function editPrincipal(id){
  const e=entries.find(x=>x.id===id); if(!e) return;
  const v=await askEdit("Importe", e.principal, {number:true});
  if(v===null) return;
  const n=parseFloat(v);
  if(isNaN(n)||n<=0){ await notify("Importe no válido."); return; }
  e.principal=n; e._open=true; await save(); render();
}
async function editConcept(id){
  const e=entries.find(x=>x.id===id); if(!e) return;
  const v=await askEdit("¿Qué es esta deuda? (vacío = «Prestado»)", e.concept||"");
  if(v===null) return;
  e.concept = v.trim(); // vacío → vuelve a «Prestado» por defecto
  e._open=true; await save(); render();
}
async function editCurrency(id){
  const e=entries.find(x=>x.id===id); if(!e) return;
  const v=await askChoose("Moneda", CURRENCIES, e.currency||"AUD");
  if(v===null) return;
  e.currency=v; e._open=true; await save(); render();
}
async function editItemCost(id,idx){
  const e=entries.find(x=>x.id===id); if(!e||!e.items[idx]) return;
  const v=await askEdit("¿Cuánto pagaste por «"+e.items[idx].name+"»? (coste, 0 = ninguno)", e.items[idx].cost||"", {number:true});
  if(v===null) return;
  const n=parseFloat(v);
  e.items[idx].cost = (isNaN(n)||n<0) ? 0 : n;
  e._open=true; await save(); render();
}

/* nueva venta */
function openNew(type){
  if(type==="sale"){
    document.getElementById("s_buyer").value="";
    document.getElementById("s_paid").checked=false;
    document.getElementById("s_cur").value="AUD";
    document.getElementById("itemRows").innerHTML="";
    addItemRow(); addItemRow();
    dlgSale.showModal();
  } else {
    document.getElementById("d_who").value="";
    document.getElementById("d_concept").value="";
    document.getElementById("d_amount").value="";
    document.getElementById("d_cur").value="AUD";
    dlgDebt.showModal();
  }
}
function addItemRow(){
  const div=document.createElement("div"); div.className="item-row";
  div.innerHTML=`<input class="iname" placeholder="Artículo"><input class="iprice" type="number" inputmode="decimal" placeholder="$">`;
  document.getElementById("itemRows").appendChild(div);
}
async function saveSale(){
  const buyer=document.getElementById("s_buyer").value.trim();
  if(!buyer){ document.getElementById("s_buyer").focus(); return; }
  const items=[...document.querySelectorAll("#itemRows .item-row")].map(r=>({name:r.querySelector(".iname").value.trim(),price:parseFloat(r.querySelector(".iprice").value)||0})).filter(i=>i.name);
  if(!items.length) return;
  // venta al contado: se siembra con un pago por el total (queda "cobrada")
  const paidNow = document.getElementById("s_paid").checked;
  const total = items.reduce((a,i)=>a+(+i.price||0),0);
  const payments = (paidNow && total>0) ? [{amount:total,date:today()}] : [];
  const cur=document.getElementById("s_cur").value||"AUD";
  const id="s-"+Date.now();
  entries.unshift({id,type:"sale",party:buyer,date:today(),currency:cur,items,payments,_open:true});
  await save(); render(); dlgSale.close(); pulse(id);
}
async function saveDebt(){
  const who=document.getElementById("d_who").value.trim();
  const amt=parseFloat(document.getElementById("d_amount").value);
  const cur=document.getElementById("d_cur").value;
  if(!who){ document.getElementById("d_who").focus(); return; }
  if(!amt||amt<=0){ document.getElementById("d_amount").focus(); return; }
  const concept=document.getElementById("d_concept").value.trim();
  const id="d-"+Date.now();
  entries.push({id,type:"debt",party:who,date:today(),currency:cur,principal:amt,concept,payments:[],_open:true});
  await save(); render(); dlgDebt.close(); pulse(id);
}

/* copia de seguridad */
function backupText(){ return JSON.stringify(entries.map(({_open, ...e}) => e), null, 2); }
function backupName(){ return "finance-tracker-"+today()+".json"; }
// huella del contenido para saber si hay cambios sin copiar (sin falsos positivos al abrir)
function hashEntries(){
  const s = backupText(); let h=0;
  for(let i=0;i<s.length;i++){ h=(h*31 + s.charCodeAt(i))|0; }
  return h+"";
}
function markBackedUp(){
  Store.set("backup_hash", hashEntries());
  Store.set("last_backup", ""+Date.now());
  updateBackupHint();
}
function updateBackupHint(){
  const el = document.getElementById("backupHint"); if(!el) return;
  const lb = +Store.get("last_backup") || 0;
  if(!lb){ el.innerHTML = `<span class="warn">⚠︎ Aún no has guardado ninguna copia — hazlo para no perder tus datos</span>`; return; }
  const dirty = Store.get("backup_hash") !== hashEntries();
  const d = new Date(lb);
  const when = `${d.getDate()}/${d.getMonth()+1}/${String(d.getFullYear()).slice(2)}`;
  el.innerHTML = dirty
    ? `<span class="warn">⚠︎ Cambios sin copiar — última copia ${when}</span>`
    : `<span class="ok">✓</span> Copia al día · ${when}`;
}
// Guardar copia: en móvil abre el menú compartir (Archivos, Mail, AirDrop…); si no, descarga.
async function shareData(){
  const file = new File([backupText()], backupName(), {type:"application/json"});
  try{
    if(navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({files:[file], title:"Copia de Finance Tracker"});
      markBackedUp();
      return;
    }
  }catch(e){ if(e && e.name==="AbortError"){ return; } /* si falla, descargamos */ }
  exportData();
}
function exportData(){
  const blob=new Blob([backupText()],{type:"application/json"});
  const url=URL.createObjectURL(blob); const a=document.createElement("a");
  a.href=url; a.download=backupName(); a.click(); URL.revokeObjectURL(url);
  markBackedUp();
}
function importData(input){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const d=JSON.parse(reader.result);
      if(!Array.isArray(d)) throw 0;
      entries=normalize(d);
      save(); markBackedUp(); render();
    }catch(e){ notify("No se pudo leer el archivo. ¿Es una copia válida?"); }
    input.value="";
  };
  reader.readAsText(file);
}

/* ——— importar inteligente (texto pegado o foto con OCR gratis) ——— */
let impItems = [];
let impCur = "AUD";
function openImport(){
  impItems = [];
  impCur = "AUD";
  document.getElementById("imp_text").value = "";
  document.getElementById("imp_status").textContent = "";
  document.getElementById("imp_step2").style.display = "none";
  document.getElementById("imp_step2").innerHTML = "";
  document.getElementById("imp_step1").style.display = "";
  dlgImport.showModal();
}
// Heurística: una línea por artículo; el último número de la línea es el precio.
function impParse(text){
  return (text||"").split(/\r?\n/).map(l=>l.trim()).filter(Boolean).map(line=>{
    const nums = line.match(/\d[\d.,]*/g);
    let price = 0, name = line;
    if(nums && nums.length){
      const tok = nums[nums.length-1];
      let raw = tok.replace(/[.,](?=\d{3}\b)/g,"").replace(",", ".");
      const n = parseFloat(raw);
      if(!isNaN(n)){
        price = n;
        name = line.slice(0, line.lastIndexOf(tok)).replace(/(A\$|US\$|[$€£])\s*$/,"").replace(/[-–—:·•=x×]+\s*$/i,"").trim();
        if(!name) name = line.replace(tok,"").replace(/(A\$|US\$|[$€£])/g,"").trim();
      }
    }
    return { name: name.replace(/\s{2,}/g," ").trim(), price };
  }).filter(it=>it.name);
}
function impAnalyze(){
  impItems = impParse(document.getElementById("imp_text").value);
  if(!impItems.length){
    document.getElementById("imp_status").textContent = "No detecté artículos. Escribe una línea por artículo, ej: Guitarra 200";
    return;
  }
  renderImpPreview();
}
function renderImpPreview(){
  const step2 = document.getElementById("imp_step2");
  step2.innerHTML = `
    <div class="imp-sep">Revisa y edita antes de crear (${impItems.length})</div>
    <input id="imp_buyer" placeholder="Comprador (¿a quién?)" autocomplete="off">
    <label class="curlbl">Moneda <select id="imp_cur" class="cur-select"></select></label>
    <div id="imp_rows"></div>
    <button class="quick" onclick="impAddRow()">+ añadir línea</button>
    <div class="dlg-actions">
      <button class="btn cancel" onclick="impBack()">Atrás</button>
      <button class="btn" onclick="impCreate()">Crear venta</button>
    </div>`;
  const rows = document.getElementById("imp_rows");
  rows.innerHTML = impItems.map((it,i)=>`<div class="item-row" data-i="${i}">
      <input class="iname" placeholder="Artículo">
      <input class="iprice" type="number" inputmode="decimal" placeholder="$">
      <button class="pay-del" title="Quitar">×</button>
    </div>`).join("");
  [...rows.querySelectorAll(".item-row")].forEach(row=>{
    const i = +row.dataset.i;
    const n = row.querySelector(".iname"), p = row.querySelector(".iprice"), d = row.querySelector(".pay-del");
    n.value = impItems[i].name; p.value = impItems[i].price || "";
    n.oninput = () => impItems[i].name = n.value;
    p.oninput = () => impItems[i].price = parseFloat(p.value) || 0;
    d.onclick = () => { impItems.splice(i,1); renderImpPreview(); };
  });
  const csel = document.getElementById("imp_cur");
  csel.innerHTML = CURRENCIES.map(c=>`<option value="${c}">${c}</option>`).join("");
  csel.value = impCur;
  csel.onchange = () => impCur = csel.value;
  document.getElementById("imp_step1").style.display = "none";
  step2.style.display = "";
}
function impAddRow(){ impItems.push({name:"",price:0}); renderImpPreview(); }
function impBack(){
  document.getElementById("imp_step2").style.display = "none";
  document.getElementById("imp_step1").style.display = "";
}
async function impCreate(){
  const buyer = (document.getElementById("imp_buyer").value||"").trim() || "Sin nombre";
  const items = impItems.map(i=>({name:(i.name||"").trim(), price:+i.price||0})).filter(i=>i.name);
  if(!items.length){ await notify("No hay artículos con nombre."); return; }
  const id = "s-"+Date.now();
  entries.unshift({id,type:"sale",party:buyer,date:today(),currency:impCur||"AUD",items,payments:[],_open:true});
  await save(); render(); dlgImport.close(); pulse(id);
}
// OCR gratis con Tesseract.js (se carga bajo demanda desde CDN; necesita internet)
function loadTesseract(){
  if(window.Tesseract) return Promise.resolve();
  return new Promise((res,rej)=>{
    const s=document.createElement("script");
    s.src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js";
    s.onload=res; s.onerror=()=>rej(new Error("no-load"));
    document.head.appendChild(s);
  });
}
document.getElementById("imp_file").addEventListener("change", async (ev)=>{
  const file = ev.target.files[0]; ev.target.value=""; if(!file) return;
  const status = document.getElementById("imp_status");
  status.textContent = "Cargando lector de texto…";
  try{
    await loadTesseract();
    status.textContent = "Leyendo la foto… 0%";
    const { data } = await Tesseract.recognize(file, "spa+eng", {
      logger: m => { if(m.status==="recognizing text") status.textContent = "Leyendo la foto… "+Math.round(m.progress*100)+"%"; }
    });
    const txt = (data && data.text || "").trim();
    document.getElementById("imp_text").value = txt;
    status.textContent = txt ? "Texto detectado — revísalo y pulsa Analizar." : "No pude leer texto en la foto. Prueba otra o escríbelo.";
  }catch(err){
    status.textContent = "No se pudo procesar la foto (¿sin conexión?). Puedes pegar el texto a mano.";
  }
});

/* empezar de cero */
async function startEmpty(){
  if(!await askConfirm("¿Borrar todas las entradas y empezar vacío? No se puede deshacer (exporta una copia antes si quieres).","Borrar todo")) return;
  entries=[];
  Store.set("seed_debts","1"); // evita que se vuelvan a sembrar las deudas
  save(); render();
}

// deslizar una tarjeta a la derecha para borrarla (con confirmación)
(function(){
  const app = document.getElementById("app");
  let card=null, sx=0, sy=0, dragging=false;
  app.addEventListener("touchstart", e=>{
    const c = e.target.closest(".card");
    card=c; if(!c) return;
    sx=e.touches[0].clientX; sy=e.touches[0].clientY; dragging=false;
  }, {passive:true});
  app.addEventListener("touchmove", e=>{
    if(!card) return;
    const dx=e.touches[0].clientX-sx, dy=e.touches[0].clientY-sy;
    if(!dragging && Math.abs(dx)>12 && Math.abs(dx)>Math.abs(dy)+4){ dragging=true; card.classList.add("swiping"); }
    if(dragging){
      const t=Math.max(0,Math.min(dx,150));   // solo hacia la derecha
      card.style.transform="translateX("+t+"px)";
      card.classList.toggle("will-del", t>90);
    }
  }, {passive:true});
  function endSwipe(){
    if(!card){ return; }
    const c=card; card=null;
    c.classList.remove("swiping");
    const past=c.classList.contains("will-del");
    c.classList.remove("will-del");
    c.style.transform="";
    if(dragging && past){ const id=c.getAttribute("data-id"); if(id) delEntry(id); }
    dragging=false;
  }
  app.addEventListener("touchend", endSwipe, {passive:true});
  app.addEventListener("touchcancel", endSwipe, {passive:true});
})();

load();

if("serviceWorker" in navigator){
  // Recarga controlada: cuando un SW nuevo toma el control (tras un deploy con
  // CACHE_VERSION distinto), recargamos una sola vez para mostrar la versión nueva.
  // hadController evita recargar en la primera instalación (cuando no había SW previo).
  const hadController = !!navigator.serviceWorker.controller;
  let refreshing = false;
  navigator.serviceWorker.addEventListener("controllerchange",()=>{
    if(refreshing || !hadController) return;
    refreshing = true;
    window.location.reload();
  });
  window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));
}
